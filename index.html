<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<title>Audio Experience</title>

<style>
:root{
  --gold:#d4af37;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Playfair Display', serif;

  background: linear-gradient(160deg,#000,#1a1a1a,#2a2205);

  color:white;
  text-align:center;

  display:flex;
  justify-content:center;
  align-items:center;

  min-height:100vh;
  padding:30px;

  overflow-x:hidden;
}

/* LUCE SEMPLIFICATA */
body::before{
  content:"";
  position:fixed;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background: radial-gradient(circle, rgba(212,175,55,0.15), transparent 60%);
  animation: moveLight 10s linear infinite;
  z-index:0;
}

@keyframes moveLight{
  0%{transform:translate(0,0);}
  50%{transform:translate(10%,10%);}
  100%{transform:translate(0,0);}
}

/* CARD */
.card{
  position:relative;
  z-index:2;

  width:320px;

  background: rgba(0,0,0,0.75);

  padding:25px;
  border-radius:20px;

  text-align:center;

  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* TESTI */
.top-text{
  font-size:16px;
  margin-bottom:15px;
}

.subtitle{
  font-size:14px;
  margin:10px 0 20px;
  color:#ddd;
}

/* 💿 VINILE FIX DEFINITIVO */
.vinyl{
  width:160px !important;
  height:160px !important;

  border-radius:50%;
  object-fit:cover;

  display:block;
  margin:0 auto 20px;

  animation: spin 4s linear infinite;
  animation-play-state: paused;

  background:transparent;
  outline:none;

  box-shadow:0 0 20px rgba(212,175,55,0.4);

  transform:translateZ(0);
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* PROGRESS */
.progress-container{
  width:100%;
  height:6px;
  background:#333;
  border-radius:10px;
  cursor:pointer;
  margin:15px 0;
}

.progress{
  height:100%;
  width:0%;
  background:var(--gold);
  border-radius:10px;
}

/* TIME */
.time{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#aaa;
}

/* BOTTONI */
.btn{
  width:100%;
  height:45px;

  margin-top:12px;

  display:flex;
  justify-content:center;
  align-items:center;

  background:var(--gold);
  color:black;

  border:none;
  border-radius:50px;

  font-family:'Playfair Display', serif;
  font-size:14px;
  font-weight:500;

  text-decoration:none;
  cursor:pointer;

  transition:0.2s ease;
}

.btn:hover{
  transform:scale(1.02);
  filter:brightness(1.1);
}

/* FOOTER */
.footer{
  margin-top:15px;
  font-size:12px;
  color:#aaa;
}

.footer a{
  color:var(--gold);
  text-decoration:none;
}

/* FRASE FINALE */
.bottom-text{
  margin-top:25px;
  max-width:320px;

  font-size:15px;
  line-height:1.6;

  color:white;

  text-shadow:
    0 0 8px rgba(212,175,55,0.3),
    0 0 15px rgba(212,175,55,0.2);
}
</style>
</head>

<body>

<div class="card">

  <div class="top-text">
    50 YEARS<br>
    The Best is Yet to Play
  </div>

  <img src="vinileluciana.png" class="vinyl" id="vinyl">

  <div class="subtitle">
    Goditi il momento.<br>
    sound selection curated by Fabio Ricciuti
  </div>

  <audio id="audio" autoplay>
    <source src="audio.mp3" type="audio/mpeg">
  </audio>

  <div class="progress-container" onclick="setProgress(event)">
    <div class="progress" id="progress"></div>
  </div>

  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <button class="btn" id="playBtn" onclick="togglePlay()">▶ Riproduci</button>
  <a href="audio.mp3" download class="btn">⬇ Download</a>

  <div class="footer">
    Realizzato da 
    <a href="https://instagram.com/TUOUSERNAME" target="_blank">3D Style</a>
  </div>

</div>

<div class="bottom-text">
  La bellezza di un traguardo sta in chi lo condivide con te. Grazie per esserci.<br>
  Il mio disco d’oro sei tu.<br>
  Con tutto il mio affetto, Luciana
</div>

<script>
const audio=document.getElementById("audio");
const progress=document.getElementById("progress");
const current=document.getElementById("current");
const duration=document.getElementById("duration");
const vinyl=document.getElementById("vinyl");
const playBtn=document.getElementById("playBtn");

function togglePlay(){
  if(audio.paused){
    audio.play();
  }else{
    audio.pause();
  }
}

audio.addEventListener("play",()=>{
  vinyl.style.animationPlayState="running";
  playBtn.textContent="⏸ Pausa";
});

audio.addEventListener("pause",()=>{
  vinyl.style.animationPlayState="paused";
  playBtn.textContent="▶ Riproduci";
});

audio.addEventListener("timeupdate",()=>{
  if(audio.duration){
    progress.style.width=(audio.currentTime/audio.duration)*100+"%";
    current.textContent=format(audio.currentTime);
  }
});

audio.addEventListener("loadedmetadata",()=>{
  duration.textContent=format(audio.duration);
});

function setProgress(e){
  const w=e.currentTarget.clientWidth;
  audio.currentTime=(e.offsetX/w)*audio.duration;
}

function format(t){
  let m=Math.floor(t/60);
  let s=Math.floor(t%60);
  if(s<10)s="0"+s;
  return m+":"+s;
}
</script>

</body>
</html>
